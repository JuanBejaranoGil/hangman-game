<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Hangman Game</title>
    <link rel="stylesheet" href="https://pyscript.net">
    <script type="module" src="https://pyscript.net"></script>
    <style>
        body { background-color: #1e1e1e; color: #ffffff; font-family: 'Courier New', Courier, monospace; padding: 20px; text-align: center; }
        h1 { color: #00ff00; }
        #output { white-space: pre-wrap; background: #000; padding: 20px; border-radius: 8px; border: 1px solid #00ff00; min-height: 300px; text-align: left; max-width: 500px; margin: 20px auto; font-size: 1.1rem; line-height: 1.4; }
        .btn-container { margin-bottom: 20px; }
        button { background-color: #00ff00; color: black; border: none; padding: 12px 25px; font-size: 1.1rem; cursor: pointer; border-radius: 5px; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #00cc00; transform: scale(1.05); }
    </style>
</head>
<body>
    <h1>Python Hangman</h1>
    
    <div class="btn-container">
        <button id="play-btn">START / RESET GAME</button>
    </div>

    <div id="output">Loading Python engine... Please wait a few seconds.</div>

    <script type="py">
import random
from pyscript import display, when, document

def web_print(text, clear=False):
    if clear:
        document.getElementById("output").innerHTML = ""
    display(text, target="output", append=True)

# The gallows art
STAGES = [r'''
  +---+

  |   |
  O   |
 /|\  |
 / \  |

      |
=========''', r'''
  +---+
  |   |
  O   |
 /|\  |
 /    |

      |
=========''', r'''
  +---+
  |   |
  O   |
 /|\  |

      |
      |
=========''', r'''
  +---+

  |   |
  O   |
 /|   |

      |
      |
=========''', r'''
  +---+

  |   |
  O   |

  |   |
      |

      |
=========''', r'''
  +---+
  |   |
  O   |

      |
      |
      |
=========''', r'''
  +---+

  |   |
      |

      |
      |
      |
=========''']

WORD_LIST = ["galaxy", "pancake", "whisper", "bicycle", "rhythm", "cactus", "mirage", "thunder", "vortex", "napkin", "quartz", "hammock", "glitch", "safari", "mumble", "falcon", "velvet", "stadium", "jungle", "anchor"]

@when("click", "#play-btn")
def run_game(event):
    web_print("Starting New Game...", clear=True)
    
    lives = 6
    chosen_word = random.choice(WORD_LIST)
    correct_letters = []
    
    web_print(f"Word length: {len(chosen_word)}")
    web_print("_ " * len(chosen_word))

    while lives > 0:
        # Prompt for input (opens browser popup)
        guess = input("Enter a letter:").lower()
        
        if not guess or len(guess) != 1:
            continue

        if guess in correct_letters:
            web_print(f"You already guessed '{guess}'!")
            continue

        if guess not in chosen_word:
            lives -= 1
            web_print(f"'{guess}' is wrong! {lives} lives left.")
        else:
            correct_letters.append(guess)
            web_print(f"Good guess! '{guess}' is in the word.")
        
        web_print(STAGES[lives])
        
        # Build the visual display of the word
        display_word = ""
        for letter in chosen_word:
            if letter in correct_letters:
                display_word += letter + " "
            else:
                display_word += "_ "
        
        web_print(display_word)

        if "_" not in display_word:
            web_print("🎉 CONGRATULATIONS! YOU WIN!")
            break
        
        if lives == 0:
            web_print(f"💀 GAME OVER! The word was: {chosen_word}")

# Update status once loaded
document.getElementById("output").innerHTML = "Ready! Click the button above to play."
    </script>
</body>
</html>
