<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Hangman Game</title>
    <!-- Brython loads much faster than PyScript -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net"></script>
    <style>
        body { background-color: #1a1a1a; color: #00ff00; font-family: 'Courier New', monospace; text-align: center; padding: 20px; }
        #output { white-space: pre; background: #000; padding: 20px; border: 2px solid #00ff00; border-radius: 10px; min-height: 300px; max-width: 500px; margin: 20px auto; text-align: left; }
        button { background: #00ff00; color: #000; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; border-radius: 5px; font-size: 1.2rem; }
    </style>
</head>

<body onload="brython()">
    <h1>PYTHON HANGMAN</h1>
    <button id="start-btn">START GAME</button>
    <div id="output">Ready to play!</div>

    <script type="text/python">
from browser import document, window
import random

STAGES = [r'''
  +---+

  |   |
  O   |
 /|\  |
 / \  |

      |
=========''', r'''
  +---+
  |   |
  O   |
 /|\  |
 /    |

      |
=========''', r'''
  +---+
  |   |
  O   |
 /|\  |

      |
      |
=========''', '''
  +---+

  |   |
  O   |
 /|   |

      |
      |
=========''', '''
  +---+

  |   |
  O   |

  |   |
      |

      |
=========''', '''
  +---+
  |   |
  O   |

      |
      |
      |
=========
''', '''
  +---+

  |   |
      |

      |
      |
      |
=========
''']
WORD_LIST = ["galaxy", "pancake", "whisper", "bicycle", "rhythm", "cactus", "mirage", "thunder", "vortex", "napkin"]

def run_game(ev):
    document["output"].text = "GAME STARTED!\n"
    lives = 6
    chosen_word = random.choice(WORD_LIST)
    correct_letters = []
    
    document["output"].text += "_ " * len(chosen_word) + "\n"

    while lives > 0:
        # window.prompt is the fast web version of input()
        guess = window.prompt("Guess a letter:").lower()
        
        if not guess or len(guess) != 1:
            continue

        if guess not in chosen_word:
            lives -= 1
            document["output"].text += f"\n'{guess}' is wrong! Lives: {lives}\n"
        else:
            if guess not in correct_letters:
                correct_letters.append(guess)
            document["output"].text += f"\nNice! '{guess}' is correct.\n"
        
        document["output"].text += STAGES[lives] + "\n"
        
        display_word = ""
        for letter in chosen_word:
            if letter in correct_letters:
                display_word += letter + " "
            else:
                display_word += "_ "
        
        document["output"].text += display_word + "\n"

        if "_" not in display_word:
            document["output"].text += "\n🎉 YOU WIN!"
            break
        
        if lives == 0:
            document["output"].text += f"\n💀 GAME OVER! Word: {chosen_word}"

document["start-btn"].bind("click", run_game)
    </script>
</body>
</html>
