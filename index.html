<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Hangman Game</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net"></script>
    <style>
        body { background-color: #1a1a1a; color: #00ff00; font-family: 'Courier New', monospace; text-align: center; padding: 20px; }
        #output { white-space: pre; background: #000; padding: 20px; border: 2px solid #00ff00; border-radius: 10px; min-height: 250px; max-width: 500px; margin: 20px auto; text-align: left; }
        .controls { margin-top: 20px; }
        input { background: #333; color: #00ff00; border: 1px solid #00ff00; padding: 10px; font-size: 1.2rem; width: 50px; text-align: center; }
        button { background: #00ff00; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 5px; margin-left: 10px; }
        #guess-container { display: none; margin-top: 20px; }
    </style>
</head>

<body onload="brython()">
    <h1>PYTHON HANGMAN</h1>
    
    <button id="start-btn">START NEW GAME</button>

    <div id="output">Ready to play!</div>

    <div id="guess-container">
        <input type="text" id="guess-input" maxlength="1" placeholder="?">
        <button id="guess-btn">GUESS</button>
    </div>

    <script type="text/python">
from browser import document, window
import random

STAGES = [r'''
  +---+

  |   |
  O   |
 /|\  |
 / \  |

      |
=========''', r'''
  +---+
  |   |
  O   |
 /|\  |
 /    |

      |
=========''', r'''
  +---+
  |   |
  O   |
 /|\  |

      |
      |
=========''', r'''
  +---+

  |   |
  O   |
 /|   |

      |
      |
=========''', r'''
  +---+

  |   |
  O   |

  |   |
      |

      |
=========''', r'''
  +---+
  |   |
  O   |

      |
      |
      |
=========''', r'''
  +---+

  |   |
      |

      |
      |
      |
=========
''']

WORD_LIST = ["galaxy", "pancake", "whisper", "bicycle", "rhythm", "cactus", "mirage", "thunder", "vortex", "napkin"]

# Global variables to track game state
game_state = {
    "lives": 6,
    "chosen_word": "",
    "correct_letters": []
}

def update_display():
    display_word = ""
    for letter in game_state["chosen_word"]:
        if letter in game_state["correct_letters"]:
            display_word += letter + " "
        else:
            display_word += "_ "
    
    content = STAGES[game_state["lives"]] + "\n\n"
    content += display_word + "\n"
    content += f"\nLives left: {game_state['lives']}"
    document["output"].text = content

    if "_" not in display_word:
        document["output"].text += "\n\n🎉 YOU WIN!"
        document["guess-container"].style.display = "none"
    elif game_state["lives"] == 0:
        document["output"].text += f"\n\n💀 GAME OVER! Word: {game_state['chosen_word']}"
        document["guess-container"].style.display = "none"

def start_game(ev):
    game_state["lives"] = 6
    game_state["chosen_word"] = random.choice(WORD_LIST)
    game_state["correct_letters"] = []
    document["guess-container"].style.display = "block"
    document["guess-input"].value = ""
    document["guess-input"].focus()
    update_display()

def make_guess(ev):
    guess = document["guess-input"].value.lower()
    document["guess-input"].value = ""
    document["guess-input"].focus()

    if not guess or len(guess) != 1 or not guess.isalpha():
        return

    if guess in game_state["chosen_word"]:
        if guess not in game_state["correct_letters"]:
            game_state["correct_letters"].append(guess)
    else:
        game_state["lives"] -= 1
    
    update_display()

# Bind buttons
document["start-btn"].bind("click", start_game)
document["guess-btn"].bind("click", make_guess)

# Allow pressing "Enter" to guess
def check_key(ev):
    if ev.keyCode == 13:
        make_guess(None)
document["guess-input"].bind("keydown", check_key)
    </script>
</body>
</html>
