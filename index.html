<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Hangman Game</title>
    <link rel="stylesheet" href="https://pyscript.net">
    <script type="module" src="https://pyscript.net"></script>
    <style>
        body { background-color: #1e1e1e; color: #ffffff; font-family: monospace; padding: 20px; }
        h1 { color: #00ff00; }
        #output { white-space: pre-wrap; background: #000; padding: 15px; border-radius: 5px; border: 1px solid #333; }
    </style>
</head>
<body>
    <h1>Python Hangman</h1>
    <div id="output"></div>

    <script type="py">
import random
from pyscript import display

# Helper to print to the web screen
def web_print(text):
    display(text, target="output", append=True)

stages = [r'''
  +---+

  |   |
  O   |
 /|\  |
 / \  |

      |
=========
''', r'''
  +---+
  |   |
  O   |
 /|\  |
 /    |

      |
=========
''', r'''
  +---+
  |   |
  O   |
 /|\  |

      |
      |
=========
''', '''
  +---+

  |   |
  O   |
 /|   |

      |
      |
=========''', '''
  +---+

  |   |
  O   |

  |   |
      |

      |
=========
''', '''
  +---+
  |   |
  O   |

      |
      |
      |
=========
''', '''
  +---+

  |   |
      |

      |
      |
      |
=========
''']

word_list = ["galaxy", "pancake", "whisper", "bicycle", "rhythm", "cactus", "mirage", "thunder", "vortex", "napkin", "quartz", "hammock", "glitch", "safari", "mumble", "falcon", "velvet", "stadium", "jungle", "anchor"]

lives = 6
chosen_word = random.choice(word_list)
placeholder = "_" * len(chosen_word)
web_print(f"Word to guess: {placeholder}")

correct_letters = []

while lives > 0:
    # PyScript will show a browser prompt for input()
    guess = input("Guess a letter:").lower()
    
    if guess not in chosen_word:
        lives -= 1
        web_print(f"Wrong! You have {lives} lives left.")
    
    web_print(stages[lives])
    
    current_display = ""
    for letter in chosen_word:
        if letter == guess or letter in correct_letters:
            current_display += letter
            if letter == guess:
                correct_letters.append(guess)
        else:
            current_display += "_"

    web_print(current_display)

    if "_" not in current_display:
        web_print("🎉 YOU WIN!")
        break
    elif lives == 0:
        web_print(f"💀 GAME OVER. The word was: {chosen_word}")
    </script>
</body>
</html>
