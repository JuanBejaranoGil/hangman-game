<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Hangman Game</title>
    <!-- Use these exact "Stable" links -->
    <link rel="stylesheet" href="https://pyscript.net">
    <script type="module" src="https://pyscript.net"></script>
    <style>
        body { background-color: #1a1a1a; color: #00ff00; font-family: 'Courier New', monospace; text-align: center; padding: 20px; }
        #output { white-space: pre; background: #000; padding: 20px; border: 2px solid #00ff00; border-radius: 10px; min-height: 300px; max-width: 500px; margin: 20px auto; text-align: left; overflow-x: auto; }
        button { background: #00ff00; color: #000; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; border-radius: 5px; font-size: 1.2rem; }
        button:hover { background: #00cc00; }
    </style>
</head>
<body>
    <h1>PYTHON HANGMAN</h1>
    <button id="start-btn">START / RESTART GAME</button>
    <div id="output">Loading Python Engine...</div>

    <script type="py">
import random
from pyscript import display, when, document

# Your original gallows
STAGES = [r'''
  +---+

  |   |
  O   |
 /|\  |
 / \  |

      |
=========''', r'''
  +---+
  |   |
  O   |
 /|\  |
 /    |

      |
=========''', r'''
  +---+
  |   |
  O   |
 /|\  |

      |
      |
=========''', r'''
  +---+

  |   |
  O   |
 /|   |

      |
      |
=========''', r'''
  +---+

  |   |
  O   |

  |   |
      |

      |
=========''', r'''
  +---+
  |   |
  O   |

      |
      |
      |
=========''', r'''
  +---+

  |   |
      |

      |
      |
      |
=========
''']

WORD_LIST = ["galaxy", "pancake", "whisper", "bicycle", "rhythm", "cactus", "mirage", "thunder", "vortex", "napkin", "quartz", "hammock", "glitch", "safari", "mumble", "falcon", "velvet", "stadium", "jungle", "anchor"]

def web_print(text, clear=False):
    out = document.getElementById("output")
    if clear: out.innerHTML = ""
    display(text, target="output", append=True)

@when("click", "#start-btn")
def play_game(event):
    web_print("GAME STARTED!\n", clear=True)
    
    lives = 6
    chosen_word = random.choice(WORD_LIST)
    correct_letters = []
    
    # Initial placeholder
    web_print("_ " * len(chosen_word))

    while lives > 0:
        guess = input("Guess a letter:").lower()
        
        if not guess or len(guess) != 1:
            continue

        if guess not in chosen_word:
            lives -= 1
            web_print(f"\n'{guess}' is wrong! Lives: {lives}")
        else:
            correct_letters.append(guess)
            web_print(f"\nNice! '{guess}' is correct.")
        
        web_print(STAGES[lives])
        
        current_display = ""
        for letter in chosen_word:
            if letter in correct_letters:
                current_display += letter + " "
            else:
                current_display += "_ "
        
        web_print(current_display)

        if "_" not in current_display:
            web_print("\n🎉 YOU WIN!")
            break
        
        if lives == 0:
            web_print(f"\n💀 GAME OVER! Word: {chosen_word}")

# Signal that we are ready
document.getElementById("output").innerHTML = "READY! Click Start to play."
    </script>
</body>
</html>
