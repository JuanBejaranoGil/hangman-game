<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Hangman Game</title>

    <!-- ✅ Correct PyScript -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

    <style>
        body {
            background-color: #1e1e1e;
            color: #00ff00;
            font-family: monospace;
            padding: 20px;
            text-align: center;
        }
        #output {
            white-space: pre-wrap;
            background: #000;
            padding: 20px;
            border: 1px solid #00ff00;
            border-radius: 8px;
            min-height: 300px;
            max-width: 500px;
            margin: 20px auto;
            text-align: left;
        }
        input {
            padding: 10px;
            font-size: 16px;
            width: 150px;
        }
        button {
            background-color: #00ff00;
            color: black;
            border: none;
            padding: 12px 20px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            margin: 5px;
        }
    </style>
</head>

<body>
    <h1>🐍 Python Hangman</h1>

    <button onclick="startGame()">START / RESET</button>
    <br><br>

    <input id="guess-input" placeholder="Enter a letter" maxlength="1">
    <button onclick="sendGuess()">GUESS</button>

    <div id="output">Loading...</div>

<script type="py">
from pyscript import display
import random

# --- GAME STATE ---
chosen_word = ""
correct_letters = []
lives = 6
game_over = True

stages = [r'''
  +---+
  |   |
  O   |
 /|\  |
 / \  |
      |
=========
''', r'''
  +---+
  |   |
  O   |
 /|\  |
 /    |
      |
=========
''', r'''
  +---+
  |   |
  O   |
 /|\  |
      |
      |
=========
''', r'''
  +---+
  |   |
  O   |
 /|   |
      |
      |
=========
''', r'''
  +---+
  |   |
  O   |
  |   |
      |
      |
=========
''', r'''
  +---+
  |   |
  O   |
      |
      |
      |
=========
''', r'''
  +---+
  |   |
      |
      |
      |
      |
=========
''']

word_list = ["galaxy", "pancake", "whisper", "bicycle", "rhythm", "cactus", "mirage", "thunder", "vortex", "napkin"]

# --- FUNCTIONS ---

def start_game():
    global chosen_word, correct_letters, lives, game_over
    chosen_word = random.choice(word_list)
    correct_letters = []
    lives = 6
    game_over = False

    display("🎮 Game Started!\n", target="output", append=False)
    display_word()

def display_word():
    display_text = ""
    for letter in chosen_word:
        if letter in correct_letters:
            display_text += letter + " "
        else:
            display_text += "_ "
    display(display_text + "\n", target="output", append=True)

def make_guess(guess):
    global lives, game_over

    if game_over:
        display("Click START first!\n", target="output", append=True)
        return

    if not guess.isalpha():
        display("Enter a letter!\n", target="output", append=True)
        return

    guess = guess.lower()

    if guess in correct_letters:
        display("Already guessed!\n", target="output", append=True)
        return

    if guess in chosen_word:
        correct_letters.append(guess)
        display(f"✅ Correct: {guess}\n", target="output", append=True)
    else:
        lives -= 1
        display(f"❌ Wrong: {guess} ({lives} lives left)\n", target="output", append=True)

    display(stages[lives], target="output", append=True)
    display_word()

    # Win check
    if all(letter in correct_letters for letter in chosen_word):
        display("🎉 YOU WIN!\n", target="output", append=True)
        game_over = True

    # Lose check
    elif lives == 0:
        display(f"💀 GAME OVER! Word was: {chosen_word}\n", target="output", append=True)
        game_over = True
</script>

<script>
function startGame() {
    pyscript.interpreter.globals.get("start_game")();
}

function sendGuess() {
    let input = document.getElementById("guess-input");
    let val = input.value;
    input.value = "";

    pyscript.interpreter.globals.get("make_guess")(val);
}
</script>

</body>
</html>
